// ─── AUTH HOOK ─────────────────────────────────────────────────────────────
function useAuth() {
  const [session, setSession] = useState(undefined); // undefined = loading
  const [profile, setProfile] = useState(null);
  const [tenant, setTenant] = useState(null);

  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      if (session) loadProfile(session.user.id);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      if (session) loadProfile(session.user.id);
      else { setProfile(null); setTenant(null); }
    });
    return () => subscription.unsubscribe();
  }, []);

  async function loadProfile(userId) {
    const { data: prof } = await sb.from('profiles').select('*, tenants(*)').eq('id', userId).single();
    if (prof) {
      setProfile(prof);
      setTenant(prof.tenants);
    }
  }

  async function signIn(email, password) {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    return error;
  }

  async function signOut() {
    await sb.auth.signOut();
  }

  return { session, profile, tenant, signIn, signOut, loadProfile };
}

// ─── DATA HOOK ─────────────────────────────────────────────────────────────
function useData(tenant, isDemo) {
  const [data, setData] = useState(null);
  const [status, setStatus] = useState('loading');
  const [lastSync, setLastSync] = useState(null);
  const [lastScored, setLastScored] = useState(null);

  const load = useCallback(async () => {
    if (isDemo) { setData(MOCK); setStatus('live'); setLastSync(new Date()); return; }
    if (!tenant) return;
    setStatus('loading');
    try {
      const tid = tenant.id;
      const [accts, crews, issues, closeouts] = await Promise.all([
        sb.from('accounts').select('*').eq('tenant_id', tid).order('health_score'),
        sb.from('crews').select('*').eq('tenant_id', tid).order('reliability_score'),
        sb.from('issues').select('*, accounts(name)').eq('tenant_id', tid).order('created_at', {ascending:false}),
        sb.from('closeouts').select('*, accounts(name), crews(name)').eq('tenant_id', tid).order('service_date', {ascending:false}).limit(20),
      ]);
      if (accts.error) throw accts.error;
      const accounts = accts.data || [];
      const scored = accounts.map(a => a.updated_at).filter(Boolean).sort().reverse()[0];
      if (scored) setLastScored(new Date(scored));
      setData({ accounts, crews: crews.data || [], issues: issues.data || [], closeouts: closeouts.data || [] });
      setLastSync(new Date());
      setStatus('live');
    } catch (err) {
      console.error('Data load failed:', err);
      setData(MOCK);
      setStatus('error');
    }
  }, [tenant, isDemo]);

  useEffect(() => { load(); const t = setInterval(load, 60000); return () => clearInterval(t); }, [load]);
  return { data, status, lastSync, lastScored, refresh: load };
}

// ─── LOGIN PAGE ────────────────────────────────────────────────────────────
function Login({ signIn }) {
  const [email, setEmail] = useState('');
  const [pass, setPass]   = useState('');
  const [err, setErr]     = useState('');
  const [loading, setLoading] = useState(false);

  async function submit() {
    if (!email || !pass) { setErr('Enter email and password.'); return; }
    setLoading(true); setErr('');
    const error = await signIn(email.trim(), pass.trim());
    if (error) setErr(error.message || 'Login failed. Check credentials.');
    setLoading(false);
  }

  const onKey = e => e.key === 'Enter' && submit();

  return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo">
          <div className="login-logo-icon">D</div>
          <div><div className="login-title">Dravik</div><div className="login-sub">Ops Intelligence Platform</div></div>
        </div>
        <div className="field"><label>Email</label><input type="text" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={onKey} placeholder="you@company.com" autoFocus /></div>
        <div className="field"><label>Password</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={onKey} placeholder="••••••••" /></div>
        <button className="login-btn" onClick={submit} disabled={loading}>{loading ? 'Signing in…' : 'Sign in to Dravik'}</button>
        {err && <div className="login-error">{err}</div>}
        <div className="login-info">
          <div className="login-info-label">First time? Create an account in Supabase Auth, then assign a tenant_id in the profiles table.</div>
        </div>
      </div>
    </div>
  );
}

      <div className="panel">
        <div className="panel-header"><div className="panel-title">Crew Roster</div><div style={{fontSize:11,color:'var(--text-2)'}}>Sorted by risk</div></div>
        {data.crews.length === 0
          ? <div className="empty-state"><div className="empty-icon">◈</div><div className="empty-title">No crews found</div><div className="empty-sub">Add crews in Supabase to get started.</div></div>
          : [...data.crews].sort((a,b)=>(a.reliability_score||0)-(b.reliability_score||0)).map(c=>(
            <div key={c.id} className="risk-row" style={{padding:'16px 20px',alignItems:'flex-start'}}>
              <div className={`score-ring ${hClass(c.reliability_score)}`}>{c.reliability_score}</div>
              <div className="risk-info" style={{marginLeft:12}}>
                <div className="risk-name">{c.name} <span style={{fontSize:11,color:'var(--text-2)',fontWeight:400}}>· {c.lead_name}</span></div>
                <div className="risk-detail">{c.jobs_completed} jobs · {c.issues_reported} issues · {c.active?'Active':'Inactive'}</div>
                {c.ai_summary && <div style={{fontSize:12,color:'var(--text-1)',marginTop:4,lineHeight:1.5}}>{c.ai_summary}</div>}
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                <span className={`pill ${c.active?'active':'terminated'}`}>{c.active?'Active':'Inactive'}</span>
                <span className={`pill ${rClass(c.risk_level)}`}>{c.risk_level} risk</span>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ─── ISSUES ────────────────────────────────────────────────────────────────
function IssuesPage({ data, refresh }) {
  const [filter, setFilter] = useState('Open');
  const [updating, setUpdating] = useState({});
  if (!data) return <div className="loader-wrap"><div className="loader"/></div>;
  const filtered = filter === 'All' ? data.issues : data.issues.filter(i=>i.status===filter);
  const openCrit = data.issues.filter(i=>i.status==='Open'&&i.severity==='Critical').length;

  async function updateStatus(id, status) {
    setUpdating(u=>({...u,[id]:status}));
    await sb.from('issues').update({ status }).eq('id', id);
    await refresh();
    setUpdating(u=>({...u,[id]:null}));
  }

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-eyebrow">Operational Issues</div>
        <div className="page-title">{data.issues.filter(i=>i.status==='Open').length} active · {openCrit} critical</div>
        <div className="page-sub">Live triage queue. AI scores severity and aging.</div>
      </div>
      <div className="stat-row stat-row-4">
        <div className="stat-card"><div className="stat-label">Open</div><div className="stat-value white">{data.issues.filter(i=>i.status==='Open').length}</div></div>
        <div className="stat-card accent-red"><div className="stat-label">Critical</div><div className="stat-value red">{openCrit}</div></div>
        <div className="stat-card accent-amber"><div className="stat-label">In Progress</div><div className="stat-value amber">{data.issues.filter(i=>i.status==='In Progress').length}</div></div>
        <div className="stat-card accent-green"><div className="stat-label">Resolved</div><div className="stat-value green">{data.issues.filter(i=>i.status==='Resolved').length}</div></div>
      </div>
      <div className="panel">
        <div className="panel-header">
          <div className="panel-title">Incident Queue</div>
          <div style={{display:'flex',gap:6}}>
            {['Open','In Progress','Resolved','All'].map(f=>(
              <button key={f} className={`btn ${filter===f?'btn-primary':'btn-ghost'}`} style={{padding:'4px 10px',fontSize:11}} onClick={()=>setFilter(f)}>{f}</button>
            ))}
          </div>
        </div>
        {filtered.length === 0
          ? <div className="empty-state"><div className="empty-icon">✓</div><div className="empty-title">All clear</div><div className="empty-sub">No issues match this filter.</div></div>
          : filtered.map(i=>(
            <div key={i.id} className="risk-row" style={{padding:'16px 20px',alignItems:'flex-start'}}>
              <div className={`risk-dot ${rClass(i.risk_level)}`} style={{marginTop:5}}/>
              <div className="risk-info" style={{marginLeft:8}}>
                <div className="risk-name">{i.accounts?.name || 'Unknown Account'}</div>
                <div style={{fontSize:13,color:'var(--text-1)',margin:'4px 0',lineHeight:1.5}}>{i.description}</div>
                {i.recommended_action && <div style={{fontSize:12,color:'var(--cyan)',fontWeight:500}}>→ {i.recommended_action}</div>}
                {i.status !== 'Resolved' && (
                  <div style={{display:'flex',gap:6,marginTop:10}}>
                    {i.status === 'Open' && (
                      <button
                        style={{fontSize:11,color:'var(--amber)',background:'var(--amber-dim)',border:'1px solid rgba(245,158,11,0.3)',padding:'4px 10px',borderRadius:4,cursor:'pointer',fontFamily:'var(--font)',opacity:updating[i.id]?0.5:1}}
                        disabled={!!updating[i.id]}
                        onClick={()=>updateStatus(i.id,'In Progress')}
                      >{updating[i.id]==='In Progress'?'Updating…':'Mark In Progress'}</button>
                    )}
                    <button
                      style={{fontSize:11,color:'var(--green)',background:'var(--green-dim)',border:'1px solid rgba(16,185,129,0.3)',padding:'4px 10px',borderRadius:4,cursor:'pointer',fontFamily:'var(--font)',opacity:updating[i.id]?0.5:1}}
                      disabled={!!updating[i.id]}
                      onClick={()=>updateStatus(i.id,'Resolved')}
                    >{updating[i.id]==='Resolved'?'Resolving…':'Mark Resolved'}</button>
                  </div>
                )}
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6,minWidth:90}}>
                <span className={`pill ${rClass(i.severity)}`}>{i.severity}</span>
                <span className={`pill ${sClass(i.status)}`}>{i.status}</span>
                <span style={{fontSize:11,color:i.days_open>7?'var(--red)':'var(--text-2)'}}>{i.days_open > 0 ? i.days_open+'d open' : 'Today'}</span>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ─── CLOSEOUTS ─────────────────────────────────────────────────────────────
function CloseoutsPage({ data }) {
  if (!data) return <div className="loader-wrap"><div className="loader"/></div>;
  const completed = data.closeouts.filter(c=>c.completion_status==='Complete').length;
  const avgConf = data.closeouts.length ? Math.round(data.closeouts.reduce((s,c)=>s+(c.crew_confidence||0),0)/data.closeouts.length) : 0;

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-eyebrow">Closeout Analysis</div>
        <div className="page-title">{data.closeouts.length} jobs in closeout window</div>
        <div className="page-sub">AI benchmarks every closeout against completion and confidence.</div>
      </div>
      <div className="stat-row stat-row-4">
        <div className="stat-card"><div className="stat-label">Total</div><div className="stat-value white">{data.closeouts.length}</div></div>
        <div className="stat-card accent-green"><div className="stat-label">Complete</div><div className="stat-value green">{completed}</div></div>
        <div className="stat-card accent-red"><div className="stat-label">Incomplete</div><div className="stat-value red">{data.closeouts.length-completed}</div></div>
        <div className="stat-card accent-cyan"><div className="stat-label">Avg Confidence</div><div className="stat-value cyan">{avgConf}</div></div>
      </div>
      <div className="panel">
        <div className="panel-header"><div className="panel-title">Recent Closeouts</div><div style={{fontSize:11,color:'var(--text-2)'}}>AI quality grading applied</div></div>
        {data.closeouts.length === 0
          ? <div className="empty-state"><div className="empty-icon">◷</div><div className="empty-title">No closeouts yet</div><div className="empty-sub">Closeouts will appear here as crews submit them.</div></div>
          : data.closeouts.map(c=>(
            <div key={c.id} className="risk-row" style={{padding:'16px 20px',alignItems:'flex-start'}}>
              <div className={`score-ring ${hClass(c.crew_confidence)}`}>{c.crew_confidence}</div>
              <div className="risk-info" style={{marginLeft:12}}>
                <div className="risk-name">{c.accounts?.name} <span style={{fontSize:11,color:'var(--text-2)',fontWeight:400}}>· {c.crews?.name}</span></div>
                <div style={{fontSize:11,color:'var(--text-2)',margin:'2px 0'}}>{c.service_date} · {c.photos_submitted} photos</div>
                {c.ai_analysis && <div style={{fontSize:12,color:'var(--text-1)',marginTop:6,lineHeight:1.5,fontStyle:'italic'}}>"{c.ai_analysis}"</div>}
              </div>
              <span className={`pill ${sClass(c.completion_status)}`}>{c.completion_status}</span>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ─── AI RECOMMENDATIONS ────────────────────────────────────────────────────
function ActionsPage({ data, refresh }) {
  const [updating, setUpdating] = useState({});
  if (!data) return <div className="loader-wrap"><div className="loader"/></div>;
  const actions = data.issues.filter(i=>i.status==='Open'||i.status==='In Progress');
  const sorted = [...actions].sort((a,b)=>{const o={Critical:0,High:1,Medium:2,Low:3};return(o[a.risk_level]||3)-(o[b.risk_level]||3);});

  async function updateStatus(id, status) {
    setUpdating(u=>({...u,[id]:status}));
    await sb.from('issues').update({ status }).eq('id', id);
    await refresh();
    setUpdating(u=>({...u,[id]:null}));
  }

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-eyebrow">AI Recommendations</div>
        <div className="page-title">{sorted.length} actions recommended</div>
        <div className="page-sub">Dravik identifies risks and routes corrective action. Your decision required.</div>
      </div>
      {sorted.length === 0
        ? <div className="panel"><div className="empty-state"><div className="empty-icon">✦</div><div className="empty-title">All caught up</div><div className="empty-sub">No open actions. Dravik is monitoring your portfolio.</div></div></div>
        : sorted.map(i=>(
          <div key={i.id} className={`action-card ${rClass(i.risk_level)}`}>
            <div className="action-header">
              <span className={`action-badge ${rClass(i.risk_level)}`}>{i.risk_level?.toUpperCase()}</span>
              <span className="action-account">{i.accounts?.name}</span>
              {i.status === 'In Progress' && <span style={{fontSize:10,fontWeight:600,color:'var(--amber)',background:'var(--amber-dim)',padding:'2px 7px',borderRadius:4,marginLeft:4}}>IN PROGRESS</span>}
              <span style={{marginLeft:'auto',fontSize:11,color:'var(--text-2)'}}>Open {i.days_open}d</span>
            </div>
            <div className="action-title">{i.recommended_action}</div>
            <div className="action-reason">{i.description}</div>
            <div className="action-footer">
              <span style={{fontSize:11,color:'var(--text-2)'}}>Severity: <span style={{color:'var(--cyan)'}}>{i.severity}</span></span>
              <div style={{marginLeft:'auto',display:'flex',gap:8}}>
                <button
                  style={{fontSize:11,color:'var(--text-2)',background:'transparent',border:'1px solid var(--border)',padding:'4px 10px',borderRadius:4,cursor:'pointer',fontFamily:'var(--font)',opacity:updating[i.id]?0.5:1}}
                  disabled={!!updating[i.id]}
                  onClick={()=>updateStatus(i.id,'Resolved')}
                >{updating[i.id]==='Resolved'?'Resolving…':'Mark Resolved'}</button>
                {i.status === 'Open' && (
                  <button
                    className="action-cta"
                    style={{opacity:updating[i.id]?0.5:1}}
                    disabled={!!updating[i.id]}
                    onClick={()=>updateStatus(i.id,'In Progress')}
                  >{updating[i.id]==='In Progress'?'Updating…':'Assign Action →'}</button>
                )}
                {i.status === 'In Progress' && (
                  <button
                    className="action-cta"
                    style={{background:'var(--green)',opacity:updating[i.id]?0.5:1}}
                    disabled={!!updating[i.id]}
                    onClick={()=>updateStatus(i.id,'Resolved')}
                  >{updating[i.id]==='Resolved'?'Resolving…':'Complete ✓'}</button>
                )}
              </div>
            </div>
          </div>
        ))
      }
    </div>
  );
}

// ─── ADMIN PAGE ────────────────────────────────────────────────────────────
function AdminPage() {
  const [tenants, setTenants] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ name:'', slug:'', webhook_url:'' });
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState('');

  useEffect(() => { loadTenants(); }, []);

  async function loadTenants() {
    setLoading(true);
    const { data } = await sb.from('tenants').select('*').order('created_at');
    setTenants(data || []);
    setLoading(false);
  }

  async function createTenant() {
    if (!form.name || !form.slug) { setMsg('Name and slug required.'); return; }
    setSaving(true);
    const { error } = await sb.from('tenants').insert({ name: form.name, slug: form.slug, webhook_url: form.webhook_url || null });
    if (error) setMsg('Error: ' + error.message);
    else { setMsg('Client created!'); setShowModal(false); setForm({name:'',slug:'',webhook_url:''}); loadTenants(); }
    setSaving(false);
  }

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-eyebrow">Admin</div>
        <div className="page-title">Client Management</div>
        <div className="page-sub">Onboard and manage Dravik clients.</div>
      </div>
      {msg && <div style={{padding:'10px 14px',background:'var(--cyan-glow)',border:'1px solid var(--cyan-dim)',borderRadius:8,marginBottom:16,fontSize:13,color:'var(--cyan)'}}>{msg}</div>}
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ Add Client</button>
      </div>
      {loading ? <div className="loader-wrap"><div className="loader"/></div>
      : tenants.length === 0
        ? <div className="panel"><div className="empty-state"><div className="empty-icon">◧</div><div className="empty-title">No clients yet</div><div className="empty-sub">Add your first client to get started.</div></div></div>
        : tenants.map(t=>(
          <div key={t.id} className="admin-card">
            <div className="admin-card-header">
              <div>
                <div style={{fontSize:15,fontWeight:600,color:'var(--text-0)'}}>{t.name} <span className="tag">{t.slug}</span></div>
                <div style={{fontSize:11,color:'var(--text-2)',marginTop:4}}>ID: {t.id}</div>
              </div>
              <span className="pill active">Active</span>
            </div>
            <div style={{fontSize:12,color:'var(--text-2)'}}>
              Webhook: <span style={{fontFamily:'var(--mono)',color:'var(--text-1)'}}>{t.webhook_url || 'Not configured'}</span>
            </div>
            <div style={{fontSize:11,color:'var(--text-2)',marginTop:8}}>
              Created: {new Date(t.created_at).toLocaleDateString()}
            </div>
          </div>
        ))
      }
      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Add New Client</div>
            <div className="field"><label>Company Name</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Kelsor Cleaning" /></div>
            <div className="field"><label>Slug (unique ID)</label><input value={form.slug} onChange={e=>setForm({...form,slug:e.target.value.toLowerCase().replace(/\s+/g,'-')})} placeholder="kelsor-cleaning" /></div>
            <div className="field"><label>n8n Webhook URL (optional)</label><input value={form.webhook_url} onChange={e=>setForm({...form,webhook_url:e.target.value})} placeholder="https://..." /></div>
            {msg && <div style={{fontSize:12,color:'var(--red)',marginBottom:12}}>{msg}</div>}
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={createTenant} disabled={saving}>{saving?'Saving…':'Create Client'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SETTINGS ──────────────────────────────────────────────────────────────
function SettingsPage({ tenant, profile }) {
  const [saved, setSaved] = useState(false);
  const [url, setUrl] = useState(tenant?.webhook_url || '');

  async function saveWebhook() {
    if (!tenant) return;
    await sb.from('tenants').update({ webhook_url: url }).eq('id', tenant.id);
    setSaved(true); setTimeout(()=>setSaved(false), 2000);
  }

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-eyebrow">Settings</div>
        <div className="page-title">Configuration</div>
        <div className="page-sub">{tenant?.name} workspace settings.</div>
      </div>
      <div className="settings-section">
        <div className="settings-label">Data Connection</div>
        <div className="settings-row">
          <div><div className="settings-row-label">n8n Webhook URL</div><div className="settings-row-sub">Dravik polls this every 60s for operational data</div></div>
          <div style={{display:'flex',gap:8}}>
            <input className="settings-input" value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://your.n8n.cloud/webhook/..." />
            <button className="btn btn-primary" onClick={saveWebhook}>{saved?'✓ Saved':'Save'}</button>
          </div>
        </div>
        <div className="settings-row">
          <div><div className="settings-row-label">Supabase Project</div><div className="settings-row-sub">Connected database</div></div>
          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--cyan)'}}>vmbzqullpmqlczhhmios</div>
        </div>
      </div>
      <div className="settings-section">
        <div className="settings-label">Account</div>
        <div className="settings-row"><div><div className="settings-row-label">Client Name</div></div><div style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text-1)'}}>{tenant?.name}</div></div>
        <div className="settings-row"><div><div className="settings-row-label">Your Role</div></div><div style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text-1)'}}>{profile?.role}</div></div>
        <div className="settings-row"><div><div className="settings-row-label">Tenant ID</div><div className="settings-row-sub">Do not share</div></div><div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text-2)'}}>{tenant?.id}</div></div>
      </div>
    </div>
  );
}

// ─── ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const { session, profile, tenant, signIn, signOut } = useAuth();
  const [page, setPage] = useState('dashboard');
  const [activeTenant, setActiveTenant] = useState(null);
  const [allTenants, setAllTenants] = useState([]);
  const isDemo = activeTenant?.slug === 'demo';

  useEffect(() => {
    if (tenant) { setActiveTenant(tenant); }
  }, [tenant]);

  useEffect(() => {
    if (profile?.role === 'admin') {
      sb.from('tenants').select('*').then(({data})=>setAllTenants(data||[]));
    } else if (tenant) {
      setAllTenants([tenant]);
    }
  }, [profile, tenant]);

  const { data, status, lastSync, lastScored, refresh } = useData(activeTenant, isDemo);

  if (session === undefined) return <div className="login-wrap"><div className="loader"/></div>;
  if (!session) return <Login signIn={signIn} />;

  const pages = {
    dashboard: <DashboardPage data={data} />,
    accounts:  <AccountsPage data={data} />,
    crew:      <CrewPage data={data} />,
    issues:    <IssuesPage data={data} refresh={refresh} />,
    closeouts: <CloseoutsPage data={data} />,
    actions:   <ActionsPage data={data} refresh={refresh} />,
    admin:     <AdminPage />,
    settings:  <SettingsPage tenant={activeTenant} profile={profile} />,
  };

  return (
    <div className="app">
      <Sidebar
        page={page} onNav={setPage}
        tenant={activeTenant} allTenants={allTenants}
        onSwitchTenant={setActiveTenant}
        profile={profile} data={data}
        onSignOut={signOut}
      />
      <div className="main">
        <Topbar page={page} status={status} lastSync={lastSync} lastScored={lastScored} onRefresh={refresh} />
        {pages[page] || <DashboardPage data={data} />}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
